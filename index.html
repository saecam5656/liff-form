<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォームへ移動中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <p>読み込み中...</p>
        <p>自動でフォームに移動します。</p>
    </div>

    <script>
        async function main() {
            const myLiffId = "2009477976-AIB897cs"; 

            await liff.init({ liffId: myLiffId });

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                const userName = encodeURIComponent(profile.displayName);

                const formUrl = `https://docs.google.com/forms/d/e/1FAIpQLSf7GW37dAiGV0nnxx6NhyFi_sYoB5myQsziLjPZnkowXaTcnQ/viewform?usp=pp_url&entry.1676946420=${userName}`;
                
                window.location.replace(formUrl);
            }
        }
        main();
    </script>
</body>
</html>
